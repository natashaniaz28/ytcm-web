services:
  - type: web
    name: ytcm-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false          # you fill this in the Render dashboard
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL after frontend deploys
      - key: RENDER
        value: "true"
    plan: free
